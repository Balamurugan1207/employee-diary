version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: diary_user
      POSTGRES_PASSWORD: diary_pass
      POSTGRES_DB: employee_diary
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://diary_user:diary_pass@db:5432/employee_diary
      SECRET_KEY: change-me-in-production
      JWT_SECRET_KEY: jwt-change-me
      CORS_ORIGINS: http://localhost
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: it-support@techfinite.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"

volumes:
  pgdata:
